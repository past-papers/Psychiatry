{ t: "Ch.3: Psychotic Disorders", qs: [

  {

        );

        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('menu');

            }, [isDarkMode]);

            useEffect(() => {
                localStorage.setItem('quiz_globalAnswers', JSON.stringify(globalAnswers));

                localStorage.setItem('quiz_markedIds', JSON.stringify(markedIds));

                const correctOpt = q.opts.find(o => o.isCorrect);
                return globalAnswers[id] === correctOpt.id;
            });
            
            const wrongIds = Object.keys(globalAnswers).filter(id => {
                const q = flatQuestions.find(fq => fq.id === id);
                if (!q) return false;
                const correctOpt = q.opts.find(o => o.isCorrect);
                return globalAnswers[id] !== correctOpt.id;

                    if (!earnedBadgeIds.includes(badge.id)) {
                        if (correctIds.length >= badge.req) {
                            newlyEarned.push(badge);

                    setEarnedBadgeIds(prev => [...prev, ...newlyEarned.map(b => b.id)]);
                    setPendingBadgeAlerts(prev => [...prev, ...newlyEarned]);
                }
            }, [correctIds.length]);

                if (pendingBadgeAlerts.length > 0) {
                    setShowBadgeModal(true);
                }
            };

            const closeBadgeModal = () => {
                setShowBadgeModal(false);
                setPendingBadgeAlerts([]);
            };

            const nextBadge = BADGES.find(b => !earnedBadgeIds.includes(b.id)) || null;

            const startQuiz = (questions, title, startIdx = 0) => {

                let preparedQuestions = shuffle([...questions]).map(q => ({
                    ...q,
                    opts: shuffle([...q.opts])
                }));
                
                setActiveQuiz(preparedQuestions);
                setQuizTitle(title);
                setCurrentQIndex(startIdx);
                setIsExplanationExpanded(true); // Reset explanation state
                setView('quiz');
            };

            const startTopic = (topicIndex) => {
                const qs = topicsData[topicIndex].qs.map(qText => flatQuestions.find(fq => fq.id === flatQuestions.find(x => x.q === qText.q).id));
                // Only load questions that have NOT been answered yet
                const unsolvedQs = qs.filter(q => globalAnswers[q.id] === undefined);
                
                if (unsolvedQs.length === 0) {
                    alert("You have already answered all questions in this topic! You can review them via the Dashboard or reset the topic to start over.");
                    return;
                }

                startQuiz(unsolvedQs, topicsData[topicIndex].t, 0);
            };

            const confirmResetTopic = (topicIndex) => {
                setConfirmDialog({
                    isOpen: true,
                    title: "Reset Topic Progress",
                    message: "Are you sure you want to reset this topic? This will affect your badges and completed questions on the dashboard.",
                    type: 'warning',
                    action: () => {
                        const qs = topicsData[topicIndex].qs.map(qText => flatQuestions.find(fq => fq.id === flatQuestions.find(x => x.q === qText.q).id));
                        const idsToReset = qs.map(q => q.id);
                        
                        setGlobalAnswers(prev => {
                            const newAnswers = { ...prev };
                            idsToReset.forEach(id => delete newAnswers[id]);
                            return newAnswers;
                        });
                        
                        setHardIds(prev => prev.filter(id => !idsToReset.includes(id)));
                        setMarkedIds(prev => prev.filter(id => !idsToReset.includes(id)));
                    }
                });
            };

            const confirmGlobalReset = () => {
                setConfirmDialog({
                    isOpen: true,
                    title: "Erase All Progress",
                    message: "Are you sure you want to completely erase all your progress, history, and badges? This action cannot be undone.",
                    type: 'danger',
                    action: () => {
                        setGlobalAnswers({});
                        setHardIds([]);
                        setMarkedIds([]);
                        setEarnedBadgeIds([]);
                        localStorage.clear();
                        if (isDarkMode) localStorage.setItem('quiz_theme', JSON.stringify(true));
                    }
                });
            };

            const startRandomMaster = () => {
                const unsolvedQs = flatQuestions.filter(q => globalAnswers[q.id] === undefined);
                const targetQs = unsolvedQs.length > 0 ? unsolvedQs : flatQuestions;
                startQuiz(targetQs, "Random Master Quiz (Unsolved)", 0);
            };

            const resolveReviewQuestions = () => {
                if (hardOrWrongIds.length === 0) return;
                const reviewQs = flatQuestions.filter(q => hardOrWrongIds.includes(q.id));
                startQuiz(reviewQs, "Review: Hard & Incorrect Questions", 0);
            };

            const reviewMarkedQuestions = () => {
                if (markedIds.length === 0) return;
                const mQs = flatQuestions.filter(q => markedIds.includes(q.id));
                startQuiz(mQs, "Review: Marked Questions", 0);
            };

            const handleOptionClick = (optId) => {
                const currentQ = activeQuiz[currentQIndex];
                if (globalAnswers[currentQ.id] !== undefined) return; 
                
                setGlobalAnswers(prev => ({ ...prev, [currentQ.id]: optId }));
                setIsExplanationExpanded(true); // Auto expand on answer

                const selectedOpt = currentQ.opts.find(o => o.id === optId);
                if (selectedOpt && selectedOpt.isCorrect) {
                    if (hardIds.includes(currentQ.id)) {
                        setHardIds(prev => prev.filter(id => id !== currentQ.id));
                    }
                }
            };

            const toggleHard = () => {
                const qId = activeQuiz[currentQIndex].id;
                if (hardIds.includes(qId)) setHardIds(prev => prev.filter(id => id !== qId));
                else setHardIds(prev => [...prev, qId]);
            };

            const toggleMark = (e) => {
                const qId = activeQuiz[currentQIndex].id;
                if (markedIds.includes(qId)) setMarkedIds(prev => prev.filter(id => id !== qId));
                else setMarkedIds(prev => [...prev, qId]);
            };

            const askChatGPTPerQuestion = () => {
                const currentQ = activeQuiz[currentQIndex];
                const optionsText = currentQ.opts.map((opt, i) => `${String.fromCharCode(65+i)}. ${opt.text}`).join('\n');
                const correctOpt = currentQ.opts.find(o => o.isCorrect);
                const correctAnswerText = correctOpt ? correctOpt.text : "";
                
                // Exclude explanations from prompt per user request
                const prompt = `Question: ${currentQ.q}\n\nOptions:\n${optionsText}\n\nCorrect Answer: ${correctAnswerText}\n\nExplain this question in detail, including why the correct answer is correct and why the other options are wrong. At the end, write a high-yield summary note to remember.`;
                window.open(`https://chatgpt.com/?q=${encodeURIComponent(prompt)}`, '_blank');
            };

            const generateTutorialWithChatGPT = () => {
                let prompt = "I found these questions hard to solve. Instead of discussing each question separately and directly, please create a well-organized and structured tutorial based on the information in these questions, along with the relevant basics, so I can read and learn\n\n";
                // Add a few difficult questions to the prompt to anchor it
                const reviewQs = flatQuestions.filter(q => hardOrWrongIds.includes(q.id)).slice(0, 5); // Limit to 5 to avoid enormous URLs
                if(reviewQs.length === 0) prompt += "Topic: Geriatric Psychiatry & ER Psychiatry.";
                
                reviewQs.forEach((q, i) => {
                    const optionsText = q.opts.map((opt, idx) => `${String.fromCharCode(65+idx)}. ${opt.text}`).join('\n');
                    const correctOpt = q.opts.find(o => o.isCorrect);
                    prompt += `Q${i+1}: ${q.q}\nOptions:\n${optionsText}\nCorrect Answer: ${correctOpt ? correctOpt.text : ''}\n\n`;
                });
                
                window.open(`https://chatgpt.com/?q=${encodeURIComponent(prompt)}`, '_blank');
            };

            const navigateHome = () => {
                setView('menu');
                triggerBadgeModalIfAny();
            };

            const nextQuestion = () => {
                if (currentQIndex < activeQuiz.length - 1) {
                    setCurrentQIndex(currentQIndex + 1);

                } else {

            };

            const prevQuestion = () => {
                if (currentQIndex > 0) {
                    setCurrentQIndex(currentQIndex - 1);

            };

            const getPercentage = (val, total) => Math.round((val / total) * 100);

            return (

                                <div className="text-center mb-8">
                                    <div className="w-20 h-20 bg-blue-100 dark:bg-blue-900/30 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <svg className="w-10 h-10 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" /></svg>
                                    </div>
                                    <h2 className="text-3xl font-bold mb-1">Session Completed!</h2>
                                </div>
                                
                                <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl p-8 mb-8 shadow-sm text-center transition-colors">
                                    <div className="text-xl font-medium text-slate-500 dark:text-slate-400 mb-4">
                                        Great job practicing! Check your dashboard for your overall stats.
                                    </div>
                                </div>

                                <div className="flex flex-col sm:flex-row justify-center gap-4 mb-8">
                                    <button 
                                        onClick={navigateHome}
                                        className="px-8 py-4 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 font-bold rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 transition shadow-sm"
                                    >
                                        Back to Dashboard
                                    </button>
                                </div>
                            </div>
                        )}
                        
                        {}
                        {showBadgeModal && pendingBadgeAlerts.length > 0 && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 fade-in">
                                <div className="bg-white dark:bg-slate-800 rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl scale-up border border-slate-200 dark:border-slate-700 relative">
                                    <button onClick={closeBadgeModal} className="absolute top-4 right-4 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
                                    </button>
                                    
                                    <div className="text-6xl mb-4 drop-shadow-md">
                                        {pendingBadgeAlerts[pendingBadgeAlerts.length - 1].icon}
                                    </div>
                                    <h3 className="text-2xl font-black text-slate-800 dark:text-white mb-2">
                                        Congratulations! 🎉
                                    </h3>
                                    <p className="text-slate-600 dark:text-slate-300 font-medium mb-6">
                                        You unlocked the <strong className="text-blue-600 dark:text-blue-400">{pendingBadgeAlerts[pendingBadgeAlerts.length - 1].label}</strong> badge!
                                    </p>
                                    
                                    <button 
                                        onClick={closeBadgeModal}
                                        className="w-full py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition shadow-sm"
                                    >
                                        Awesome!
                                    </button>
                                </div>
                            </div>
                        )}

                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
